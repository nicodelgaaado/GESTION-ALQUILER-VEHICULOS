services:
  - type: web
    name: fleetflow-web
    runtime: python
    plan: free
    region: oregon
    repo: https://github.com/nicodelgaaado/GESTION-ALQUILER-VEHICULOS
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash start.sh
    healthCheckPath: /health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleetflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "127.0.0.1,localhost"
      - key: TIME_ZONE
        value: "America/Bogota"
      - key: SECURE_SSL_REDIRECT
        value: "true"

databases:
  - name: fleetflow-db
    databaseName: fleetflow_prod
    user: fleetflow_user
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
